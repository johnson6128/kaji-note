name: PR Check

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  check:
    name: Lint / TypeCheck / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: TypeScript type check
        if: hashFiles('package.json') != ''
        run: npx tsc --noEmit

      - name: Lint
        if: hashFiles('package.json') != ''
        run: npm run lint

      - name: Test
        if: hashFiles('package.json') != ''
        run: npm test -- --ci --coverage
