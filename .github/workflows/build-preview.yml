name: Build Preview (develop)

on:
  push:
    branches:
      - develop

jobs:
  build:
    name: EAS Build (preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (preview)
        run: eas build --profile preview --platform ios --non-interactive

      - name: Build Android (preview)
        run: eas build --profile preview --platform android --non-interactive

      - name: Submit to TestFlight (Internal)
        run: eas submit --profile preview --platform ios --non-interactive

      - name: Submit to Google Play (Internal Track)
        run: eas submit --profile preview --platform android --non-interactive

      - name: Publish OTA update (preview channel)
        run: eas update --channel preview --message "develop: ${{ github.event.head_commit.message }}" --non-interactive
